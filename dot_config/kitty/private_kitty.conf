# BEGIN_KITTY_THEME
# Adwaita dark
include current-theme.conf
window_padding_width 4
font_family MesloLGS NF
font_size 9.0
tab_bar_edge top
tab_bar_style powerline
tab_title_template "{index}: {(title.split('/')[-1] if (title.startswith('/') or title.startswith('~')) else title)[:20]}"
shell_integration enabled

# Machine-local overrides live here, untracked; no-op where absent
globinclude kitty.local.conf

map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9
# END_KITTY_THEME
