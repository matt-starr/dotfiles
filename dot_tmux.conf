set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:RGB,xterm-256color:RGB"

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Set tmux prefix to ctrl+a
set -g prefix C-a

# Binding to reload config
bind r source-file ~/.tmux.conf \; display -d 1000 "Config reloaded!"

# Kill pane without confirmation
bind x kill-pane

# Vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resize (prefix + H/J/K/L, repeatable)
set -g repeat-time 5000
bind -r H resize-pane -L 6
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 6

# Vim-style splits (prefix + v/s), open in current path
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'matt-starr/rose-pine-tmux'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tweekmonster/tmux2html'
set -g @plugin 'NHDaly/tmux-better-mouse-mode'
set -g @plugin 'Morantron/tmux-fingers'

# --- Plugin Settings ---
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_session_icon ' '
set -g @rose_pine_window_status_separator ' '
set -g @rose_pine_status_right_prepend_section '#{prefix_highlight}#[fg=#ebbcba] #W#[fg=#7e6a86] │ #[fg=#e0def4]#S'
set -g @rose_pine_status_left_override ' '

set -g @prefix_highlight_prefix_prompt '⌘'
set -g @prefix_highlight_fg '#191724'
set -g @prefix_highlight_bg '#eb6f92'
set -g @prefix_highlight_empty_prompt ''
set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_output_suffix ' '

set -g @fingers-jump-key 'G'

# Initialize TMUX plugin manager (keep this line at the bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
